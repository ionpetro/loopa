app = "demo-studio-backend"
primary_region = "sjc"
# Give the shutdown handler time to fail open jobs and close cloud browsers.
kill_timeout = "30s"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "3001"
  PUBLIC_URL = "https://demo-studio-backend.fly.dev"
  # Web-app base for watch-page links (also joins the CORS allowlist).
  FRONTEND_URL = "https://demo-studio-three.vercel.app"

[http_service]
  internal_port = 3001
  force_https = true
  # Sessions, jobs, and finished videos live in this one process's memory and
  # disk — the machine must not stop between chat turns.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

# shared-cpu-1x could not finish an encode: burst credits ran out mid-ffmpeg,
# progress fell to ~5% per 100s, and the 10-min compose watchdog SIGKILLed it.
[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
